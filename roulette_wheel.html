
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --felt:#1a4a2e; --felt-dark:#0f2e1c; --gold:#c9a84c; --gold-light:#f0d080;
    --gold-dark:#7a5c1e; --red:#c0392b; --black:#1a1a1a; --green:#1a7a3a;
    --text:#e8e2d8; --muted:#8a8070;
  }
  body{background:var(--felt-dark);font-family:'Inter',sans-serif;color:var(--text);
    display:flex;flex-direction:column;align-items:center;min-height:100vh;
    padding:16px 8px 24px;user-select:none;-webkit-tap-highlight-color:transparent;}
  h1{font-family:'Cinzel',serif;font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;
    letter-spacing:0.2em;text-transform:uppercase;
    background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:2px;}
  .subtitle{font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}

  /* Wheel container */
  .wheel-wrap{position:relative;width:min(300px,88vw);height:min(300px,88vw);margin:0 auto 16px;}
  .wheel-outer{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#4a3010,#1a1000);
    border:6px solid var(--gold-dark);
    box-shadow:0 0 0 3px #0a0800,0 0 40px rgba(201,168,76,0.25),inset 0 0 30px rgba(0,0,0,0.6);}
  #wheelCanvas{position:absolute;inset:6px;border-radius:50%;}
  /* Ball */
  .ball{position:absolute;width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff 0%,#d0d0d0 60%,#888 100%);
    box-shadow:0 2px 6px rgba(0,0,0,0.8),inset 0 -1px 2px rgba(0,0,0,0.3);
    transform-origin:0 0;pointer-events:none;display:none;
    top:50%;left:50%;margin:-6px 0 0 -6px;}
  /* Center cap */
  .wheel-cap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:48px;height:48px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#8a6a20,#3a2a08);
    border:3px solid var(--gold);z-index:10;
    box-shadow:0 0 12px rgba(0,0,0,0.8),inset 0 0 8px rgba(0,0,0,0.5);}
  /* Result */
  .result-box{display:flex;align-items:center;gap:12px;margin-bottom:14px;min-height:52px;}
  .result-num{font-family:'Cinzel',serif;font-size:2.4rem;font-weight:900;
    width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:3px solid var(--gold-dark);opacity:0;transition:opacity 0.4s;line-height:1;}
  .result-num.show{opacity:1;}
  .result-num.red{background:var(--red);color:#fff;border-color:#ff6655;}
  .result-num.black{background:#222;color:#fff;border-color:#666;}
  .result-num.green{background:var(--green);color:#fff;border-color:#4aaa6a;}
  .result-label{font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity 0.4s;}
  .result-label.show{opacity:1;}
  /* Controls */
  .controls{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:320px;}
  .spin-btn{padding:14px 56px;background:transparent;border:2px solid var(--gold-dark);border-radius:4px;
    font-family:'Cinzel',serif;font-size:0.88rem;font-weight:700;letter-spacing:0.22em;
    text-transform:uppercase;color:var(--gold);cursor:pointer;
    transition:border-color 0.2s,background 0.2s,transform 0.1s;}
  .spin-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.08);}
  .spin-btn:active{transform:scale(0.97);}
  .spin-btn:disabled{opacity:0.4;cursor:not-allowed;}
  /* Stats row */
  .stats{display:flex;gap:20px;margin-top:4px;}
  .stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .stat-val{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--gold);}
  .stat-lbl{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
  /* Sound toggle */
  .top-row{width:100%;max-width:340px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .snd-btn{background:transparent;border:1px solid var(--gold-dark);border-radius:4px;
    color:var(--gold);font-size:0.9rem;cursor:pointer;padding:5px 9px;}
  .snd-btn:hover{border-color:var(--gold);}
  /* History dots */
  .history{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:320px;margin-top:6px;min-height:20px;}
  .hdot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);}
  .hdot.red{background:var(--red);}
  .hdot.black{background:#333;}
  .hdot.green{background:var(--green);}
</style>

<h2 class="sr-only">Roulette Rad</h2>

<div class="top-row">
  <h1>Roulette</h1>
  <button class="snd-btn" id="sndBtn" onclick="toggleSound()">🔊</button>
</div>
<p class="subtitle">Place your bets — spin the wheel</p>

<div class="wheel-wrap">
  <div class="wheel-outer">
    <canvas id="wheelCanvas"></canvas>
  </div>
  <div class="ball" id="ball"></div>
  <div class="wheel-cap"></div>
</div>

<div class="result-box">
  <div class="result-num" id="resultNum">0</div>
  <div class="result-label" id="resultLabel">—</div>
</div>

<div class="controls">
  <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 Drehen</button>
  <div class="stats">
    <div class="stat"><span class="stat-val" id="sRed">0</span><span class="stat-lbl">Rot</span></div>
    <div class="stat"><span class="stat-val" id="sTotal">0</span><span class="stat-lbl">Gesamt</span></div>
    <div class="stat"><span class="stat-val" id="sBlack">0</span><span class="stat-lbl">Schwarz</span></div>
    <div class="stat"><span class="stat-val" id="sGreen">0</span><span class="stat-lbl">Grün</span></div>
  </div>
</div>
<div class="history" id="history"></div>

<script>
// ── Roulette numbers in order (European single-zero) ──
var NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
var RED_NUMS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);

function getColor(n){ return n===0?'green': RED_NUMS.has(n)?'red':'black'; }
function getLabel(n){ if(n===0) return 'Zero — Grün'; var c=RED_NUMS.has(n)?'Rot':'Schwarz'; var p=n%2===0?'Gerade':'Ungerade'; return c+' · '+p+' · '+(n<=18?'1–18':'19–36'); }

// ── Canvas Wheel ──
var canvas=document.getElementById('wheelCanvas');
var ctx2=canvas.getContext('2d');
var N=NUMS.length;
var sliceAngle=2*Math.PI/N;
var wheelRot=0; // current rotation in radians

function resize(){
  var s=canvas.parentElement.clientWidth-12;
  canvas.width=s; canvas.height=s;
}
resize();

function drawWheel(rot){
  var w=canvas.width, cx=w/2, cy=w/2, r=w/2;
  ctx2.clearRect(0,0,w,w);
  // Clip to circle
  ctx2.save(); ctx2.beginPath(); ctx2.arc(cx,cy,r,0,2*Math.PI); ctx2.clip();

  for(var i=0;i<N;i++){
    var startA=rot+i*sliceAngle-Math.PI/2;
    var endA=startA+sliceAngle;
    var n=NUMS[i];
    var col=getColor(n);
    // Slice fill
    ctx2.beginPath(); ctx2.moveTo(cx,cy); ctx2.arc(cx,cy,r,startA,endA); ctx2.closePath();
    ctx2.fillStyle=col==='red'?'#c0392b':col==='black'?'#1a1a1a':'#1a7a3a';
    ctx2.fill();
    // Slice border
    ctx2.strokeStyle='rgba(201,168,76,0.5)'; ctx2.lineWidth=1;
    ctx2.beginPath(); ctx2.moveTo(cx,cy); ctx2.arc(cx,cy,r,startA,endA); ctx2.closePath(); ctx2.stroke();
    // Number text
    var midA=startA+sliceAngle/2;
    var tr=r*0.78;
    var tx=cx+Math.cos(midA)*tr, ty=cy+Math.sin(midA)*tr;
    ctx2.save(); ctx2.translate(tx,ty); ctx2.rotate(midA+Math.PI/2);
    ctx2.fillStyle='#fff'; ctx2.font='bold '+(r*0.085)+'px Inter,sans-serif';
    ctx2.textAlign='center'; ctx2.textBaseline='middle';
    ctx2.shadowColor='rgba(0,0,0,0.7)'; ctx2.shadowBlur=3;
    ctx2.fillText(n,0,0); ctx2.restore();
  }

  // Inner decorative ring
  ctx2.beginPath(); ctx2.arc(cx,cy,r*0.55,0,2*Math.PI);
  ctx2.strokeStyle='rgba(201,168,76,0.6)'; ctx2.lineWidth=2; ctx2.stroke();
  ctx2.beginPath(); ctx2.arc(cx,cy,r*0.56,0,2*Math.PI);
  ctx2.strokeStyle='rgba(0,0,0,0.5)'; ctx2.lineWidth=1; ctx2.stroke();

  // Inner dark area
  ctx2.beginPath(); ctx2.arc(cx,cy,r*0.54,0,2*Math.PI);
  ctx2.fillStyle='radial-gradient' in ctx2?'#1a1000':'#1a1000'; // fallback
  var grd=ctx2.createRadialGradient(cx-r*0.1,cy-r*0.1,0,cx,cy,r*0.54);
  grd.addColorStop(0,'#4a3010'); grd.addColorStop(1,'#0a0800');
  ctx2.fillStyle=grd; ctx2.fill();

  // Tick marks on outer rim
  for(var i=0;i<N;i++){
    var a=rot+i*sliceAngle-Math.PI/2+sliceAngle/2;
    ctx2.beginPath();
    ctx2.moveTo(cx+Math.cos(a)*(r*0.92), cy+Math.sin(a)*(r*0.92));
    ctx2.lineTo(cx+Math.cos(a)*(r*0.99), cy+Math.sin(a)*(r*0.99));
    ctx2.strokeStyle='rgba(201,168,76,0.8)'; ctx2.lineWidth=1.5; ctx2.stroke();
  }
  ctx2.restore();
}

drawWheel(0);

// ── Pointer (fixed at top) ──
// drawn as part of wheel-outer via CSS triangle (no extra element)

// ── Ball ──
var ballEl=document.getElementById('ball');
var ballRaf=null, ballAngle=0, ballRadius=0;

function positionBall(angle, radius){
  var w=canvas.width;
  var cx=w/2+6, cy=w/2+6; // offset for border
  var x=cx+Math.cos(angle)*radius;
  var y=cy+Math.sin(angle)*radius;
  ballEl.style.left=x+'px';
  ballEl.style.top=y+'px';
}

// ── Sound ──
var soundOn=true, actx=null;
function getCtx(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }
function toggleSound(){ soundOn=!soundOn; document.getElementById('sndBtn').textContent=soundOn?'🔊':'🔇'; }

function playClick(){
  if(!soundOn) return;
  var ctx=getCtx(), t=ctx.currentTime;
  var buf=ctx.createBuffer(1,ctx.sampleRate*0.012,ctx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  var src=ctx.createBufferSource(); src.buffer=buf;
  var f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=3500; f.Q.value=2;
  // highshelf brightness
  var shelf=ctx.createBiquadFilter(); shelf.type='highshelf'; shelf.frequency.value=4000; shelf.gain.value=10;
  var g=ctx.createGain(); g.gain.value=0.5;
  src.connect(f); f.connect(shelf); shelf.connect(g); g.connect(ctx.destination);
  src.start(t);
}

function playBallRoll(progress){
  if(!soundOn) return;
  var ctx=getCtx(), t=ctx.currentTime;
  var freq=600+progress*800;
  var osc=ctx.createOscillator(); osc.type='sine'; osc.frequency.value=freq;
  var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.06,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
  osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t+0.05);
}

function playLand(color){
  if(!soundOn) return;
  var ctx=getCtx(), t=ctx.currentTime;
  // Bright metallic ting
  var freqs=color==='green'?[1047,1319,1568]:(color==='red'?[880,1108,1320]:[660,831,990]);
  freqs.forEach(function(freq,i){
    var ot=t+i*0.04;
    var shelf=ctx.createBiquadFilter(); shelf.type='highshelf'; shelf.frequency.value=3000; shelf.gain.value=10;
    var osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type='sine'; osc.frequency.setValueAtTime(freq,ot); osc.frequency.exponentialRampToValueAtTime(freq*0.7,ot+0.4);
    g.gain.setValueAtTime(0.0001,ot); g.gain.exponentialRampToValueAtTime(0.55,ot+0.008); g.gain.exponentialRampToValueAtTime(0.001,ot+0.5);
    osc.connect(g); g.connect(shelf); shelf.connect(ctx.destination); osc.start(ot); osc.stop(ot+0.55);
  });
  // Impact thud
  var buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);
  var ns=ctx.createBufferSource(); ns.buffer=buf;
  var nf=ctx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value=800;
  var ng=ctx.createGain(); ng.gain.value=0.4;
  ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination); ns.start(t);
}

function playFanfare(){
  if(!soundOn) return;
  var ctx=getCtx();
  var shelf=ctx.createBiquadFilter(); shelf.type='highshelf'; shelf.frequency.value=3000; shelf.gain.value=8;
  shelf.connect(ctx.destination);
  [523,659,784,1047,1319].forEach(function(f,i){
    var t=ctx.currentTime+i*0.09;
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.4,t+0.015); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.connect(g); g.connect(shelf); o.start(t); o.stop(t+0.25);
  });
}

// ── Stats ──
var counts={red:0,black:0,green:0,total:0};
function updateStats(color){
  counts[color]++; counts.total++;
  document.getElementById('sRed').textContent=counts.red;
  document.getElementById('sBlack').textContent=counts.black;
  document.getElementById('sGreen').textContent=counts.green;
  document.getElementById('sTotal').textContent=counts.total;
  // History dot
  var dot=document.createElement('div');
  dot.className='hdot '+color;
  var hist=document.getElementById('history');
  hist.appendChild(dot);
  if(hist.children.length>20) hist.removeChild(hist.children[0]);
}

// ── Spin ──
var spinning=false;
var clickInterval=null;

function spin(){
  if(spinning) return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('resultNum').className='result-num';
  document.getElementById('resultLabel').className='result-label';

  // Pick random outcome
  var targetIdx=Math.floor(Math.random()*N);
  var targetNum=NUMS[targetIdx];
  var targetColor=getColor(targetNum);

  // Wheel: spin multiple full rotations + land on target
  // The target slot center should be at the top (angle = -π/2 from canvas)
  // slot[i] center angle = wheelRot + i*sliceAngle - π/2 + sliceAngle/2 after rotation
  // We want targetIdx slot at top (-π/2): rot + targetIdx*sliceAngle + sliceAngle/2 = -π/2 + 2kπ
  // rot = -π/2 - targetIdx*sliceAngle - sliceAngle/2 + 2kπ
  var spins=6;
  var targetRot=-Math.PI/2 - targetIdx*sliceAngle - sliceAngle/2 + spins*2*Math.PI;
  // Normalize: add enough 2π to ensure positive large spin from current wheelRot
  while(targetRot < wheelRot + 4*Math.PI) targetRot += 2*Math.PI;

  var startWheelRot=wheelRot;
  var duration=4500; // ms
  var startTs=null;

  // Ball: starts spinning fast opposite direction near outer rim, then slows inward
  var ballAngle=Math.random()*2*Math.PI;
  var ballRadiusMax, ballRadiusMin;

  ballEl.style.display='block';

  // Click sound interval (slows down with wheel)
  var lastClickAngle=0, clickEvery=sliceAngle;

  // Ball final angle = where target slot is (top = -π/2 in canvas coords, adjusted for border)
  var finalBallAngle=-Math.PI/2 - targetIdx*sliceAngle - sliceAngle/2 + targetRot - targetRot; // = angle of target slot at end

  function easeOut(p){ return 1-Math.pow(1-p,3); }
  function easeInOut(p){ return p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2; }

  function animFrame(ts){
    if(!startTs) startTs=ts;
    var elapsed=ts-startTs;
    var p=Math.min(elapsed/duration,1);
    var ep=easeOut(p);

    // Wheel rotation
    var curWheelRot=startWheelRot+(targetRot-startWheelRot)*ep;
    wheelRot=curWheelRot;
    drawWheel(curWheelRot);

    // Click sound when passing slot boundaries
    var relAngle=curWheelRot-startWheelRot;
    var clicksPassed=Math.floor(relAngle/sliceAngle);
    if(clicksPassed>lastClickAngle){ playClick(); lastClickAngle=clicksPassed; }

    // Ball animation
    var w=canvas.width;
    ballRadiusMax=w/2*0.88; ballRadiusMin=w/2*0.60;
    // Ball spins opposite, faster at start, decelerates
    var ballSpeed=(1-ep)*8+0.5; // radians per frame-ish, scale by elapsed
    ballAngle -= (elapsed/duration)*Math.PI*2*4*(1-p*0.8); // approximate
    // actually let's drive by elapsed properly
    var ballRadius=ballRadiusMax-(ballRadiusMax-ballRadiusMin)*Math.pow(p,0.7);
    // final approach: snap ball to target slot angle
    if(p>0.88){
      var snapP=(p-0.88)/0.12;
      var targetBallAngle=targetRot - (targetIdx*sliceAngle+sliceAngle/2) - Math.PI/2;
      // simplify: final ball angle is where the target pocket ends up on the wheel
      // target pocket center in absolute angle = curWheelRot-Math.PI/2 + targetIdx*sliceAngle+sliceAngle/2
      // but wheel keeps rotating, use final targetRot
      var finalAngle=targetRot-Math.PI/2+targetIdx*sliceAngle+sliceAngle/2;
      // interpolate ballAngle to finalAngle
      var diff=finalAngle-ballAngle;
      while(diff>Math.PI) diff-=2*Math.PI;
      while(diff<-Math.PI) diff+=2*Math.PI;
      ballAngle+=diff*snapP*0.15;
      ballRadius=ballRadiusMin+(ballRadiusMax*0.08)*(1-snapP);
    }

    positionBall(ballAngle, ballRadius);
    if(p<1){
      requestAnimationFrame(animFrame);
    } else {
      // Done
      clearInterval(clickInterval);
      ballEl.style.display='none';
      playLand(targetColor);
      if(targetColor==='green') setTimeout(playFanfare,300);

      var numEl=document.getElementById('resultNum');
      numEl.textContent=targetNum;
      numEl.className='result-num show '+targetColor;
      document.getElementById('resultLabel').textContent=getLabel(targetNum);
      document.getElementById('resultLabel').className='result-label show';
      updateStats(targetColor);
      spinning=false;
      document.getElementById('spinBtn').disabled=false;
    }
  }
  requestAnimationFrame(animFrame);
}

window.addEventListener('resize',function(){ resize(); drawWheel(wheelRot); });
</script>
